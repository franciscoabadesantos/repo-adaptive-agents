# Bootstrap configuration for developing repo-adaptive-agents.
model = "gpt-5.6-luna"
model_reasoning_effort = "high"

[agents]
max_threads = 3
max_depth = 1
interrupt_message = true

[agents.repo_explorer]
description = "Read-only, targeted repository exploration and architecture mapping."
config_file = "agents/repo_explorer.toml"

[agents.implementation_agent]
description = "The sole editor for an explicitly assigned file area."
config_file = "agents/implementation_agent.toml"

[agents.independent_reviewer]
description = "Read-only independent review of a scoped diff and acceptance criteria."
config_file = "agents/independent_reviewer.toml"
